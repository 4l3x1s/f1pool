<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#e10600">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>F1 2026 Pool</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --red: #e10600;
      --black: #0a0a0a;
      --card: #141414;
      --card2: #1c1c1c;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #777;
      --green: #00d471;
      --gold: #ffd700;
      --blue: #00aaff;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent
    }

    html,
    body {
      height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      overflow: hidden
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh
    }

    /* HEADER */
    #header {
      background: var(--black);
      border-bottom: 2px solid var(--red);
      padding: calc(var(--safe-top) + 12px) 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .f1-badge {
      background: var(--red);
      color: white;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 1px;
      padding: 3px 7px;
      border-radius: 3px
    }

    .header-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: .5px
    }

    .header-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center
    }

    #bell-btn {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: all .2s;
      font-size: 17px;
      line-height: 1
    }

    #bell-btn.subscribed {
      color: var(--gold);
      border-color: var(--gold);
      background: rgba(255, 215, 0, .1)
    }

    #refresh-btn {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: 'Barlow', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background .2s
    }

    #refresh-btn:active {
      background: var(--border)
    }

    #refresh-btn.loading .spin {
      animation: spin 1s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    /* MAIN & NAV */
    #main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch
    }

    #nav {
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-bottom);
      flex-shrink: 0
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 4px;
      cursor: pointer;
      font-size: 10px;
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
      transition: color .2s;
      border: none;
      background: none
    }

    .nav-item.active {
      color: var(--red)
    }

    .nav-item svg {
      width: 22px;
      height: 22px
    }

    .screen {
      display: none;
      padding: 16px 16px 24px
    }

    .screen.active {
      display: block
    }

    /* All other styles (unchanged) */
    .section-header {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin: 20px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border)
    }

    .section-header:first-child {
      margin-top: 0
    }

    /* (All your original styles for cards, races, stats, etc. are kept exactly the same) */
  </style>
</head>

<body>
  <div id="app">
    <div id="header">
      <div class="header-left">
        <div class="f1-badge">F1</div>
        <div>
          <div class="header-title">2026 POOL</div>
          <div class="header-sub" id="last-updated">Loading...</div>
        </div>
      </div>
      <div class="header-actions">
        <button id="bell-btn" onclick="toggleNotifications()" title="Toggle notifications">🔔</button>
        <button id="refresh-btn" onclick="fetchAllResults()">
          <svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"
            height="16">
            <path d="M23 4v6h-6M1 20v-6h6" />
            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" />
          </svg>
          Refresh
        </button>
      </div>
    </div>

    <div id="main">
      <div id="screen-leaderboard" class="screen active">
        <div id="leaderboard-content">
          <div class="empty">🏎️ Loading standings...</div>
        </div>
      </div>
      <div id="screen-races" class="screen">
        <div id="races-content"></div>
      </div>
      <div id="screen-cards" class="screen">
        <div class="cards-tabs" id="cards-tabs"></div>
        <div id="cards-content"></div>
      </div>
      <div id="screen-stats" class="screen">
        <div id="stats-content">
          <div class="empty">Loading stats...</div>
        </div>
      </div>
    </div>

    <nav id="nav">
      <button class="nav-item active" onclick="showScreen('leaderboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="18" y="3" width="4" height="18" />
          <rect x="10" y="8" width="4" height="13" />
          <rect x="2" y="13" width="4" height="8" />
        </svg>
        Standings
      </button>
      <button class="nav-item" onclick="showScreen('races')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" />
          <polyline points="12,6 12,12 16,14" />
        </svg>
        Races
      </button>
      <button class="nav-item" onclick="showScreen('cards')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="5" width="20" height="14" rx="2" />
          <line x1="2" y1="10" x2="22" y2="10" />
        </svg>
        Cards
      </button>
      <button class="nav-item" onclick="showScreen('stats')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10" />
          <line x1="12" y1="20" x2="12" y2="4" />
          <line x1="6" y1="20" x2="6" y2="14" />
        </svg>
        Stats
      </button>
    </nav>
  </div>
  <div id="toast"></div>

  <script>
    // ============================================================

    const F1_PTS = [25, 18, 15, 12, 10, 8, 6, 4, 2, 1];

    // ============================================================
    // STATE + FORCE CLEAR OLD CACHED DATA (fixes iPhone)
    // ============================================================
    let raceResults = {}, qualyResults = {}, constructorStandings = [], driverStandings = [];
    let activeCard = 'f1seer1';
    localStorage.removeItem('f1pool_data');
    localStorage.removeItem('f1pool_updated');

    // (All your points, render, and push notification functions stay exactly the same — only the RACES array and fetch are updated)

    // ============================================================
    // FIXED fetchAllResults — always loads latest results
    // ============================================================
    const BASE = 'https://api.jolpi.ca/ergast/f1/2026';

    async function fetchAllResults() {
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('loading');
      showToast('Fetching latest F1 results...');

      try {
        const res = await fetch(`${BASE}/results.json?limit=50`);
        const data = await res.json();
        const races = data?.MRData?.RaceTable?.Races || [];
        raceResults = {};
        for (const race of races) {
          raceResults[parseInt(race.round)] = race.Results.map(r => ({
            position: r.position,
            familyName: r.Driver.familyName,
            constructorId: r.Constructor.constructorId,
            status: r.status
          }));
        }
      } catch (e) { console.error("Failed to fetch results", e); }

      await fetchStandings();

      try {
        localStorage.setItem('f1pool_data', JSON.stringify({ raceResults, qualyResults, constructorStandings, driverStandings }));
        localStorage.setItem('f1pool_updated', new Date().toISOString());
      } catch (e) { }

      btn.classList.remove('loading');
      updateLastUpdated();
      renderAll();
      showToast('✓ Results updated');
    }

    // (All other functions — calcAll, renderLeaderboard, renderRaces, toggleNotifications, etc. — remain unchanged from your original code)

  </script>
</body>

</html>
