<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#e10600">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>F1 2026 Pool</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --red: #e10600;
      --black: #0a0a0a;
      --card: #141414;
      --card2: #1c1c1c;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #777;
      --green: #00d471;
      --gold: #ffd700;
      --blue: #00aaff;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px)
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent
    }

    html,
    body {
      height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      overflow: hidden
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh
    }

    #header {
      background: var(--black);
      border-bottom: 2px solid var(--red);
      padding: calc(var(--safe-top)+12px) 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .f1-badge {
      background: var(--red);
      color: white;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 1px;
      padding: 3px 7px;
      border-radius: 3px
    }

    .header-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: .5px
    }

    .header-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center
    }

    #bell-btn {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: all .2s;
      font-size: 17px;
      line-height: 1
    }

    #bell-btn.subscribed {
      color: var(--gold);
      border-color: var(--gold);
      background: rgba(255, 215, 0, .1)
    }

    #refresh-btn {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: 'Barlow', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background .2s
    }

    #refresh-btn:active {
      background: var(--border)
    }

    #install-btn {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      display: none
    }

    #refresh-btn.loading .spin {
      animation: spin 1s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    #main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch
    }

    #nav {
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-bottom);
      flex-shrink: 0
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 4px;
      cursor: pointer;
      font-size: 10px;
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
      transition: color .2s;
      border: none;
      background: none
    }

    .nav-item.active {
      color: var(--red)
    }

    .nav-item svg {
      width: 22px;
      height: 22px
    }

    .screen {
      display: none;
      padding: 16px 16px 24px
    }

    .screen.active {
      display: block
    }

    .section-header {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin: 20px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border)
    }

    .section-header:first-child {
      margin-top: 0
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="header">
      <div class="header-left">
        <div class="f1-badge">F1</div>
        <div>
          <div class="header-title">2026 POOL</div>
          <div class="header-sub" id="last-updated">Loading...</div>
        </div>
      </div>
      <div class="header-actions">
        <button id="bell-btn" onclick="toggleNotifications()" title="Toggle notifications">🔔</button>
        <button id="refresh-btn" onclick="fetchAllResults()" title="Refresh">Refresh</button>
        <button id="install-btn" onclick="installPWA()">📲 Install App</button>
      </div>
    </div>

    <div id="main">
      <div id="screen-leaderboard" class="screen active">
        <div id="leaderboard-content">
          <div class="empty">🏎️ Loading standings...</div>
        </div>
      </div>
    </div>

    <nav id="nav">
      <button class="nav-item active" onclick="showScreen('leaderboard')">Standings</button>
    </nav>
  </div>
  <div id="toast"></div>

  <script>
    // UNREGISTER ALL OLD SERVICE WORKERS (breaks stubborn iOS cache)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(registrations => {
        for (let registration of registrations) registration.unregister();
      });
    }

    // SAFE LOCALSTORAGE
    const safeStorage = {
      getItem: (key) => { try { return localStorage.getItem(key); } catch (e) { return null; } },
      setItem: (key, value) => { try { localStorage.setItem(key, value); } catch (e) { } },
      removeItem: (key) => { try { localStorage.removeItem(key); } catch (e) { } }
    };

    // Clear old cache
    safeStorage.removeItem('f1pool_data');
    safeStorage.removeItem('f1pool_updated');

    // MANUAL PWA INSTALL BUTTON
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-btn').style.display = 'block';
    });

    async function installPWA() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') document.getElementById('install-btn').style.display = 'none';
        deferredPrompt = null;
      }
    }

    // STATE
    let RACES = [];

    // FETCH FROM API
    const BASE = 'https://api.jolpi.ca/ergast/f1/2026';

    async function fetchAllResults() {
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('loading');
      document.getElementById('leaderboard-content').innerHTML = '<div class="empty">Fetching 2026 data...</div>';

      try {
        const res = await fetch(`${BASE}/`);
        const data = await res.json();
        RACES = data.MRData.RaceTable.Races.map(r => ({
          round: parseInt(r.round),
          name: r.raceName,
          circuit: r.Circuit.circuitName,
          date: r.date
        }));

        // Simple render for now
        let html = `<h2>✅ Loaded ${RACES.length} races</h2><p>First race: ${RACES[0].name} on ${RACES[0].date}</p>`;
        document.getElementById('leaderboard-content').innerHTML = html;

      } catch (e) {
        document.getElementById('leaderboard-content').innerHTML = `<div class="empty">❌ ${e.message}</div>`;
      }

      btn.classList.remove('loading');
    }

    function showScreen(screen) { /* placeholder */ }
    function toggleNotifications() { alert('Notifications toggled (bell works)'); }
    function showToast(msg) { console.log(msg); }

    // Auto-load on start
    fetchAllResults();
  </script>
</body>

</html>
