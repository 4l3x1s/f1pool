<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#e10600">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon.svg">
    <title>F1 2026 Pool</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --red: #e10600;
            --black: #0a0a0a;
            --card: #141414;
            --card2: #1c1c1c;
            --border: #2a2a2a;
            --text: #f0f0f0;
            --muted: #777;
            --green: #00d471;
            --gold: #ffd700;
            --blue: #00aaff;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px)
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent
        }

        html,
        body {
            height: 100%;
            background: var(--black);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            overflow: hidden
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100dvh
        }

        #header {
            background: var(--black);
            border-bottom: 2px solid var(--red);
            padding: calc(var(--safe-top)+12px) 16px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 10
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .f1-badge {
            background: var(--red);
            color: white;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 1px;
            padding: 3px 7px;
            border-radius: 3px
        }

        .header-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: .5px
        }

        .header-sub {
            font-size: 11px;
            color: var(--muted);
            margin-top: 1px
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center
        }

        #bell-btn {
            background: var(--card2);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: all .2s;
            font-size: 17px;
            line-height: 1
        }

        #bell-btn.subscribed {
            color: var(--gold);
            border-color: var(--gold);
            background: rgba(255, 215, 0, .1)
        }

        #refresh-btn {
            background: var(--card2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            font-family: 'Barlow', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background .2s
        }

        #install-btn {
            background: var(--card2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
            display: none
        }

        #refresh-btn:active {
            background: var(--border)
        }

        #refresh-btn.loading .spin {
            animation: spin 1s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        #main {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch
        }

        #nav {
            background: var(--card);
            border-top: 1px solid var(--border);
            display: flex;
            padding-bottom: var(--safe-bottom);
            flex-shrink: 0
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 10px 4px;
            cursor: pointer;
            font-size: 10px;
            color: var(--muted);
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            letter-spacing: .5px;
            text-transform: uppercase;
            transition: color .2s;
            border: none;
            background: none
        }

        .nav-item.active {
            color: var(--red)
        }

        .nav-item svg {
            width: 22px;
            height: 22px
        }

        .screen {
            display: none;
            padding: 16px 16px 24px
        }

        .screen.active {
            display: block
        }

        .section-header {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin: 20px 0 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border)
        }

        .section-header:first-child {
            margin-top: 0
        }
    </style>
</head>

<body>
    <div id="app">
        <div id="header">
            <div class="header-left">
                <div class="f1-badge">F1</div>
                <div>
                    <div class="header-title">2026 POOL</div>
                    <div class="header-sub" id="last-updated">Loading...</div>
                </div>
            </div>
            <div class="header-actions">
                <button id="bell-btn" onclick="toggleNotifications()" title="Toggle notifications">🔔</button>
                <button id="refresh-btn" onclick="fetchAllResults()" title="Refresh">Refresh</button>
                <button id="install-btn" onclick="installPWA()">📲 Install App</button>
            </div>
        </div>

        <div id="main">
            <div id="screen-leaderboard" class="screen active">
                <div id="leaderboard-content">
                    <div class="empty">🏎️ Loading standings...</div>
                </div>
            </div>
            <div id="screen-races" class="screen">
                <div id="races-content"></div>
            </div>
            <div id="screen-cards" class="screen">
                <div id="cards-content"></div>
            </div>
            <div id="screen-stats" class="screen">
                <div id="stats-content"></div>
            </div>
        </div>

        <nav id="nav">
            <button class="nav-item active" onclick="showScreen('leaderboard')">Standings</button>
            <button class="nav-item" onclick="showScreen('races')">Races</button>
            <button class="nav-item" onclick="showScreen('cards')">Cards</button>
            <button class="nav-item" onclick="showScreen('stats')">Stats</button>
        </nav>
    </div>
    <div id="toast"></div>

    <script>
        // UNREGISTER OLD CACHE + SAFE LOCALSTORAGE
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let registration of registrations) registration.unregister();
            });
        }

        const safeStorage = {
            getItem: (key) => { try { return localStorage.getItem(key); } catch (e) { return null; } },
            setItem: (key, value) => { try { localStorage.setItem(key, value); } catch (e) { } },
            removeItem: (key) => { try { localStorage.removeItem(key); } catch (e) { } }
        };

        safeStorage.removeItem('f1pool_data');
        safeStorage.removeItem('f1pool_updated');

        // MANUAL PWA INSTALL BUTTON
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-btn').style.display = 'block';
        });

        async function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('install-btn').style.display = 'none';
                deferredPrompt = null;
            }
        }

        // FULL ORIGINAL CODE
        const F1_PTS = [25, 18, 15, 12, 10, 8, 6, 4, 2, 1];

        const ENTRIES = [
            { id: 'f1seer1', name: 'F1SEER_1', owner: 'Alexis', color: '#00d471', full: { A: 'Russell', B: 'Piastri', C: 'Bearman', D: 'Lindblad', E: 'Alonso' }, half: { F: 'Verstappen', G: 'Hamilton', H: 'Gasly', I: 'Bortoleto', J: 'Perez' }, bonus: { q1: 'mercedes', q2: 'Leclerc', q3: 'Russell' } },
            { id: 'f1seer2', name: 'F1SEER_2', owner: 'Alexis', color: '#e10600', full: { A: 'Russell', B: 'Hamilton', C: 'Bearman', D: 'Lindblad', E: 'Alonso' }, half: { F: 'Verstappen', G: 'Antonelli', H: 'Gasly', I: 'Bortoleto', J: 'Perez' }, bonus: { q1: 'mercedes', q2: 'Leclerc', q3: 'Russell' } },
            { id: 'paul', name: 'Datrain33', owner: 'Paul', color: '#ff9b00', full: { A: 'Verstappen', B: 'Piastri', C: 'Sainz', D: 'Lawson', E: 'Perez' }, half: { F: 'Norris', G: 'Antonelli', H: 'Gasly', I: 'Albon', J: 'Alonso' }, bonus: { q1: 'mclaren', q2: 'Verstappen', q3: 'Verstappen' } },
            { id: 'wife', name: 'Peaches', owner: 'Johana', color: '#ff6bbb', full: { A: 'Russell', B: 'Piastri', C: 'Sainz', D: 'Albon', E: 'Alonso' }, half: { F: 'Verstappen', G: 'Antonelli', H: 'Gasly', I: 'Bortoleto', J: 'Perez' }, bonus: { q1: 'mclaren', q2: 'Verstappen', q3: 'Verstappen' } }
        ];

        const BASE = 'https://api.jolpi.ca/ergast/f1/2026';
        let RACES = [];
        let raceResults = {}, qualyResults = {}, constructorStandings = [], driverStandings = [];
        let activeCard = 'f1seer1';

        // SCORING
        function normName(name) { return name.toLowerCase().replace(/[^a-z]/g, ''); }
        function isFinished(status) { return status === 'Finished'; }
        function getPointsForPosition(pos, isHalf) {
            const p = F1_PTS[parseInt(pos) - 1] || 0;
            return isHalf ? p / 2 : p;
        }
        function calcEntryPoints(entry, raceResults) {
            let fullPts = 0, halfPts = 0;
            for (const [round, results] of Object.entries(raceResults)) {
                if (!results || !results.length) continue;
                const allPicks = [
                    ...Object.entries(entry.full || {}).map(([_, drv]) => ({ drv, isHalf: false })),
                    ...Object.entries(entry.half || {}).map(([_, drv]) => ({ drv, isHalf: true }))
                ];
                for (const { drv, isHalf } of allPicks) {
                    const result = results.find(r => normName(r.familyName) === normName(drv));
                    if (result) {
                        let pts = getPointsForPosition(result.position, isHalf);
                        if (isFinished(result.status)) pts += 1;
                        if (isHalf) halfPts += pts; else fullPts += pts;
                    }
                }
            }
            return { total: fullPts + halfPts, fullPts, halfPts };
        }
        function calcAllEntries(raceResults) {
            return ENTRIES.map(e => ({ ...e, points: calcEntryPoints(e, raceResults) }))
                .sort((a, b) => b.points.total - a.points.total);
        }

        // RENDER
        function renderLeaderboard() {
            const sorted = calcAllEntries(raceResults);
            let html = '<div class="section-header">STANDINGS</div>';
            sorted.forEach(e => {
                html += `<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center">
      <div style="width:4px;height:36px;background:${e.color};border-radius:2px;margin-right:12px"></div>
      <div>
        <div style="font-weight:700">${e.name}</div>
        <div style="font-size:12px;color:var(--muted)">${e.owner}</div>
      </div>
      <div style="margin-left:auto;font-weight:800;font-size:28px">${e.points.total.toFixed(1)}</div>
    </div>`;
            });
            document.getElementById('leaderboard-content').innerHTML = html;
        }

        function renderRaces() {
            const today = new Date();
            let nextRaceFound = false;
            let html = '<div class="section-header">RACE CALENDAR</div>';
            RACES.forEach(r => {
                const raceDate = new Date(r.date);
                const isNext = !nextRaceFound && raceDate > today;
                if (isNext) nextRaceFound = true;
                html += `<div style="background:var(--card);padding:12px;margin-bottom:8px;border-radius:8px">${isNext ? '🔥 ' : '🏁 '}${r.name} — ${r.date}</div>`;
            });
            document.getElementById('races-content').innerHTML = html;
        }

        function renderCards() {
            let html = '<div class="section-header">YOUR DRIVER PICKS</div>';
            ENTRIES.forEach(e => {
                html += `<div style="background:var(--card);padding:14px;margin-bottom:12px;border-radius:12px">
      <strong>${e.name} (${e.owner})</strong><br>
      <strong>Full boxes:</strong> ${Object.values(e.full).join(', ')}<br>
      <strong>Half boxes:</strong> ${Object.values(e.half).join(', ')}
    </div>`;
            });
            document.getElementById('cards-content').innerHTML = html;
        }

        function renderStats() {
            // Official F1 driver & constructor standings
            let html = '<div class="section-header">DRIVER STANDINGS</div>';
            if (driverStandings && driverStandings.length) {
                driverStandings.forEach(d => {
                    html += `<div style="background:var(--card);padding:12px;margin-bottom:6px;border-radius:8px;display:flex;justify-content:space-between">
        <span>${d.position}. ${d.Driver.givenName} ${d.Driver.familyName}</span>
        <span style="font-weight:700">${d.points} pts</span>
      </div>`;
                });
            } else {
                html += '<div style="padding:20px;text-align:center;color:var(--muted)">Driver standings loading...</div>';
            }

            html += '<div class="section-header" style="margin-top:20px">CONSTRUCTOR STANDINGS</div>';
            if (constructorStandings && constructorStandings.length) {
                constructorStandings.forEach(c => {
                    html += `<div style="background:var(--card);padding:12px;margin-bottom:6px;border-radius:8px;display:flex;justify-content:space-between">
        <span>${c.position}. ${c.Constructor.name}</span>
        <span style="font-weight:700">${c.points} pts</span>
      </div>`;
                });
            } else {
                html += '<div style="padding:20px;text-align:center;color:var(--muted)">Constructor standings loading...</div>';
            }

            document.getElementById('stats-content').innerHTML = html;
        }

        // HELPERS
        function showScreen(screen) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + screen).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.onclick.toString().includes(screen)));
        }
        function toggleNotifications() {
            const btn = document.getElementById('bell-btn');
            const isSubscribed = btn.classList.toggle('subscribed');
            btn.innerHTML = isSubscribed ? '🔕' : '🔔';
        }
        function showToast(msg) { console.log(msg); }
        function updateLastUpdated() { document.getElementById('last-updated').textContent = 'Updated just now'; }

        // FETCH ALL DATA
        async function fetchAllResults() {
            const btn = document.getElementById('refresh-btn');
            btn.classList.add('loading');
            showToast('Fetching latest F1 results...');

            try {
                // Schedule
                const scheduleRes = await fetch(`${BASE}/`);
                const scheduleData = await scheduleRes.json();
                RACES = scheduleData.MRData.RaceTable.Races.map(r => ({
                    round: parseInt(r.round),
                    name: r.raceName,
                    circuit: r.Circuit.circuitName,
                    date: r.date,
                    flag: '🏁'
                }));

                // Results
                const resRes = await fetch(`${BASE}/results.json?limit=50`);
                const resData = await resRes.json();
                const races = resData?.MRData?.RaceTable?.Races || [];
                raceResults = {};
                for (const race of races) {
                    raceResults[parseInt(race.round)] = race.Results.map(r => ({
                        position: r.position,
                        familyName: r.Driver.familyName,
                        constructorId: r.Constructor.constructorId,
                        status: r.status
                    }));
                }

                // Official standings for Stats tab
                const driverRes = await fetch(`${BASE}/driverStandings.json?limit=50`);
                const driverData = await driverRes.json();
                driverStandings = driverData.MRData.StandingsTable.StandingsLists[0]?.DriverStandings || [];

                const constRes = await fetch(`${BASE}/constructorStandings.json?limit=50`);
                const constData = await constRes.json();
                constructorStandings = constData.MRData.StandingsTable.StandingsLists[0]?.ConstructorStandings || [];

            } catch (e) {
                console.error("API error", e);
            }

            renderLeaderboard();
            renderRaces();
            renderCards();
            renderStats();
            updateLastUpdated();
            btn.classList.remove('loading');
            showToast('✓ Results updated');
        }

        // Auto load
        fetchAllResults();
    </script>
</body>

</html>
