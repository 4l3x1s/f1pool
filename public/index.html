<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#e10600">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>F1 2026 Pool</title>
  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: sans-serif;
      padding: 20px;
    }

    #status {
      font-size: 18px;
      margin: 20px 0;
    }
  </style>
</head>

<body>
  <h1>F1 2026 Pool - Diagnostic</h1>
  <div id="status">Loading...</div>

  <script>
    const BASE = 'https://api.jolpi.ca/ergast/f1/2026';

    async function loadData() {
      const status = document.getElementById('status');
      status.textContent = 'Fetching schedule from API...';

      try {
        const res = await fetch(`${BASE}/`);
        const data = await res.json();
        const races = data.MRData.RaceTable.Races;
        status.innerHTML = `<strong>✅ Success!</strong><br>Loaded ${races.length} races from API.<br>First race: ${races[0].raceName} on ${races[0].date}`;
        console.log('Full data:', data);
      } catch (e) {
        status.innerHTML = `❌ Error: ${e.message}`;
        console.error(e);
      }
    }

    loadData();
  </script>
</body>

</html>
