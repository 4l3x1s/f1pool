<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#e10600">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>F1 2026 Pool</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --red: #e10600;
      --black: #0a0a0a;
      --card: #141414;
      --card2: #1c1c1c;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #777;
      --green: #00d471;
      --gold: #ffd700;
      --blue: #00aaff;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px)
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent
    }

    html,
    body {
      height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      overflow: hidden
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh
    }

    #header {
      background: var(--black);
      border-bottom: 2px solid var(--red);
      padding: calc(var(--safe-top)+12px) 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .f1-badge {
      background: var(--red);
      color: white;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 1px;
      padding: 3px 7px;
      border-radius: 3px
    }

    .header-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: .5px
    }

    .header-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center
    }

    #bell-btn {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: all .2s;
      font-size: 17px;
      line-height: 1
    }

    #bell-btn.subscribed {
      color: var(--gold);
      border-color: var(--gold);
      background: rgba(255, 215, 0, .1)
    }

    #refresh-btn {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: 'Barlow', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background .2s
    }

    #refresh-btn:active {
      background: var(--border)
    }

    #refresh-btn.loading .spin {
      animation: spin 1s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    #main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch
    }

    #nav {
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-bottom);
      flex-shrink: 0
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 4px;
      cursor: pointer;
      font-size: 10px;
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
      transition: color .2s;
      border: none;
      background: none
    }

    .nav-item.active {
      color: var(--red)
    }

    .nav-item svg {
      width: 22px;
      height: 22px
    }

    .screen {
      display: none;
      padding: 16px 16px 24px
    }

    .screen.active {
      display: block
    }

    .section-header {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin: 20px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border)
    }

    .section-header:first-child {
      margin-top: 0
    }

    .entry-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color .2s, transform .15s;
      position: relative;
      overflow: hidden
    }

    .entry-card:active {
      transform: scale(.98)
    }

    .entry-card.rank-1 {
      border-color: var(--gold)
    }

    .rank-ghost {
      position: absolute;
      top: 0;
      right: 0;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 52px;
      color: rgba(255, 255, 255, .04);
      line-height: 1;
      padding: 4px 10px
    }

    .entry-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px
    }

    .entry-bar {
      width: 4px;
      height: 36px;
      border-radius: 2px;
      flex-shrink: 0
    }

    .entry-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 17px
    }

    .entry-owner {
      font-size: 12px;
      color: var(--muted)
    }

    .entry-pts {
      margin-left: auto;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 28px
    }

    .entry-pts span {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted)
    }

    .entry-breakdown {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px
    }

    .bd-item {
      background: var(--card2);
      border-radius: 6px;
      padding: 6px 8px;
      text-align: center
    }

    .bd-label {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px
    }

    .bd-val {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 16px;
      margin-top: 1px
    }

    .season-progress {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-top: 4px
    }

    .prog-hdr {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 12px
    }

    .prog-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden
    }

    .prog-fill {
      height: 100%;
      background: var(--red);
      border-radius: 2px;
      transition: width .5s
    }

    /* (all other styles exactly as in your original file) */
  </style>
</head>

<body>
  <div id="app">
    <div id="header">
      <div class="header-left">
        <div class="f1-badge">F1</div>
        <div>
          <div class="header-title">2026 POOL</div>
          <div class="header-sub" id="last-updated">Loading...</div>
        </div>
      </div>
      <div class="header-actions">
        <button id="bell-btn" onclick="toggleNotifications()" title="Toggle notifications">🔔</button>
        <button id="refresh-btn" onclick="fetchAllResults()">
          <svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"
            height="16">
            <path d="M23 4v6h-6M1 20v-6h6" />
            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" />
          </svg>
          Refresh
        </button>
      </div>
    </div>

    <div id="main">
      <div id="screen-leaderboard" class="screen active">
        <div id="leaderboard-content">
          <div class="empty">🏎️ Loading standings...</div>
        </div>
      </div>
      <div id="screen-races" class="screen">
        <div id="races-content"></div>
      </div>
      <div id="screen-cards" class="screen">
        <div class="cards-tabs" id="cards-tabs"></div>
        <div id="cards-content"></div>
      </div>
      <div id="screen-stats" class="screen">
        <div id="stats-content">
          <div class="empty">Loading stats...</div>
        </div>
      </div>
    </div>

    <nav id="nav">
      <button class="nav-item active" onclick="showScreen('leaderboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="18" y="3" width="4" height="18" />
          <rect x="10" y="8" width="4" height="13" />
          <rect x="2" y="13" width="4" height="8" />
        </svg>
        Standings
      </button>
      <button class="nav-item" onclick="showScreen('races')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" />
          <polyline points="12,6 12,12 16,14" />
        </svg>
        Races
      </button>
      <button class="nav-item" onclick="showScreen('cards')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="5" width="20" height="14" rx="2" />
          <line x1="2" y1="10" x2="22" y2="10" />
        </svg>
        Cards
      </button>
      <button class="nav-item" onclick="showScreen('stats')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10" />
          <line x1="12" y1="20" x2="12" y2="4" />
          <line x1="6" y1="20" x2="6" y2="14" />
        </svg>
        Stats
      </button>
    </nav>
  </div>
  <div id="toast"></div>

  <script>
    // ============================================================
    // CONFIG & DATA — CORRECT 2026 CALENDAR (Australian GP = 8 March 2026)
    // ============================================================
    const F1_PTS = [25, 18, 15, 12, 10, 8, 6, 4, 2, 1];

    const ENTRIES = [
      { id: 'f1seer1', name: 'F1SEER_1', owner: 'Alexis', color: '#00d471', full: { A: 'Russell', B: 'Piastri', C: 'Bearman', D: 'Lindblad', E: 'Alonso' }, half: { F: 'Verstappen', G: 'Hamilton', H: 'Gasly', I: 'Bortoleto', J: 'Perez' }, bonus: { q1: 'mercedes', q2: 'Leclerc', q3: 'Russell' } },
      { id: 'f1seer2', name: 'F1SEER_2', owner: 'Alexis', color: '#e10600', full: { A: 'Russell', B: 'Hamilton', C: 'Bearman', D: 'Lindblad', E: 'Alonso' }, half: { F: 'Verstappen', G: 'Antonelli', H: 'Gasly', I: 'Bortoleto', J: 'Perez' }, bonus: { q1: 'mercedes', q2: 'Leclerc', q3: 'Russell' } },
      { id: 'paul', name: 'Datrain33', owner: 'Paul', color: '#ff9b00', full: { A: 'Verstappen', B: 'Piastri', C: 'Sainz', D: 'Lawson', E: 'Perez' }, half: { F: 'Norris', G: 'Antonelli', H: 'Gasly', I: 'Albon', J: 'Alonso' }, bonus: { q1: 'mclaren', q2: 'Verstappen', q3: 'Verstappen' } },
      { id: 'wife', name: 'Peaches', owner: 'Johana', color: '#ff6bbb', full: { A: 'Russell', B: 'Piastri', C: 'Sainz', D: 'Albon', E: 'Alonso' }, half: { F: 'Verstappen', G: 'Antonelli', H: 'Gasly', I: 'Lawson', J: 'Perez' }, bonus: { q1: 'mercedes', q2: 'Verstappen', q3: 'Russell' } }
    ];

    const TEAM_NAMES = { red_bull: 'Red Bull', mercedes: 'Mercedes', ferrari: 'Ferrari', mclaren: 'McLaren', alpine: 'Alpine', williams: 'Williams', aston_martin: 'Aston Martin', haas: 'Haas', rb: 'Racing Bulls', kick_sauber: 'Audi/Sauber', sauber: 'Audi/Sauber' };
    const DRIVER_TEAM = { verstappen: 'red_bull', hadjar: 'red_bull', russell: 'mercedes', antonelli: 'mercedes', leclerc: 'ferrari', hamilton: 'ferrari', norris: 'mclaren', piastri: 'mclaren', gasly: 'alpine', colapinto: 'alpine', sainz: 'williams', albon: 'williams', alonso: 'aston_martin', stroll: 'aston_martin', hulkenberg: 'sauber', bortoleto: 'sauber', bearman: 'haas', ocon: 'haas', lawson: 'rb', lindblad: 'rb', perez: 'cadillac', bottas: 'cadillac' };

    const RACES = [
      { round: 1, name: 'Australian GP', circuit: 'Melbourne', date: '2026-03-08', flag: '🇦🇺' },
      { round: 2, name: 'Chinese GP', circuit: 'Shanghai', date: '2026-03-15', flag: '🇨🇳' },
      { round: 3, name: 'Japanese GP', circuit: 'Suzuka', date: '2026-03-29', flag: '🇯🇵' },
      { round: 4, name: 'Bahrain GP', circuit: 'Sakhir', date: '2026-04-12', flag: '🇧🇭' },
      { round: 5, name: 'Saudi Arabian GP', circuit: 'Jeddah', date: '2026-04-19', flag: '🇸🇦' },
      { round: 6, name: 'Miami GP', circuit: 'Miami', date: '2026-05-03', flag: '🇺🇸' },
      { round: 7, name: 'Imola GP', circuit: 'Imola', date: '2026-05-24', flag: '🇮🇹' },
      { round: 8, name: 'Monaco GP', circuit: 'Monaco', date: '2026-05-31', flag: '🇲🇨' },
      { round: 9, name: 'Spanish GP', circuit: 'Barcelona', date: '2026-06-07', flag: '🇪🇸' },
      { round: 10, name: 'Canadian GP', circuit: 'Montreal', date: '2026-06-14', flag: '🇨🇦' },
      { round: 11, name: 'Austrian GP', circuit: 'Spielberg', date: '2026-06-28', flag: '🇦🇹' },
      { round: 12, name: 'British GP', circuit: 'Silverstone', date: '2026-07-05', flag: '🇬🇧' },
      { round: 13, name: 'Belgian GP', circuit: 'Spa', date: '2026-07-26', flag: '🇧🇪' },
      { round: 14, name: 'Hungarian GP', circuit: 'Budapest', date: '2026-08-02', flag: '🇭🇺' },
      { round: 15, name: 'Dutch GP', circuit: 'Zandvoort', date: '2026-08-30', flag: '🇳🇱' },
      { round: 16, name: 'Italian GP', circuit: 'Monza', date: '2026-09-06', flag: '🇮🇹' },
      { round: 17, name: 'Azerbaijan GP', circuit: 'Baku', date: '2026-09-20', flag: '🇦🇿' },
      { round: 18, name: 'Singapore GP', circuit: 'Marina Bay', date: '2026-10-04', flag: '🇸🇬' },
      { round: 19, name: 'United States GP', circuit: 'Austin', date: '2026-10-25', flag: '🇺🇸' },
      { round: 20, name: 'Mexico GP', circuit: 'Mexico City', date: '2026-11-01', flag: '🇲🇽' },
      { round: 21, name: 'Brazilian GP', circuit: 'Interlagos', date: '2026-11-15', flag: '🇧🇷' },
      { round: 22, name: 'Las Vegas GP', circuit: 'Las Vegas', date: '2026-11-22', flag: '🇺🇸' },
      { round: 23, name: 'Qatar GP', circuit: 'Lusail', date: '2026-11-29', flag: '🇶🇦' },
      { round: 24, name: 'Abu Dhabi GP', circuit: 'Yas Marina', date: '2026-12-06', flag: '🇦🇪' }
    ];

    // ============================================================
    // STATE + FORCE CLEAR OLD CACHED DATA
    // ============================================================
    let raceResults = {}, qualyResults = {}, constructorStandings = [], driverStandings = [];
    let activeCard = 'f1seer1';
    localStorage.removeItem('f1pool_data');
    localStorage.removeItem('f1pool_updated');

    // ============================================================
    // POINTS & HELPERS
    // ============================================================
    function norm(n) { return (n || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, '').trim(); }
    function finished(s) { if (!s) return false; const l = s.toLowerCase(); return l === 'finished' || l.startsWith('+'); }
    function pospts(pos, half) { const p = parseInt(pos); if (p < 1 || p > 10) return 0; return half ? F1_PTS[p - 1] / 2 : F1_PTS[p - 1]; }

    function calcEntry(entry) {
      if (entry.pending || !entry.full) return { total: 0, byDriver: {}, byRace: {}, fullPts: 0, halfPts: 0 };
      let fullPts = 0, halfPts = 0;
      const byDriver = {}, byRace = {};
      for (const [rs, results] of Object.entries(raceResults)) {
        const round = parseInt(rs); byRace[round] = 0;
        if (!results?.length) continue;
        const picks = [...Object.entries(entry.full).map(([box, drv]) => ({ box, drv, isHalf: false })), ...Object.entries(entry.half).map(([box, drv]) => ({ box, drv, isHalf: true }))];
        for (const { box, drv, isHalf } of picks) {
          const r = results.find(x => norm(x.familyName) === norm(drv));
          if (!r) continue;
          let pts = pospts(r.position, isHalf);
          if (finished(r.status)) pts += 1;
          byDriver[drv] = (byDriver[drv] || 0) + pts;
          byRace[round] = (byRace[round] || 0) + pts;
          if (isHalf) halfPts += pts; else fullPts += pts;
        }
      }
      return { total: fullPts + halfPts, fullPts, halfPts, bonusPts: 0, byDriver, byRace };
    }

    function calcAll() { return ENTRIES.map(e => ({ ...e, points: calcEntry(e) })).sort((a, b) => b.points.total - a.points.total); }
    function getPoleLeader() { const t = {}; for (const r of Object.values(qualyResults)) { const p = r?.find(x => parseInt(x.position) === 1); if (p) t[p.familyName] = (t[p.familyName] || 0) + 1; } return Object.entries(t).sort((a, b) => b[1] - a[1])[0] || null; }
    function getWinsLeader() { const t = {}; for (const r of Object.values(raceResults)) { const p = r?.find(x => parseInt(x.position) === 1); if (p) t[p.familyName] = (t[p.familyName] || 0) + 1; } return Object.entries(t).sort((a, b) => b[1] - a[1])[0] || null; }
    function getCtorLeader() { return constructorStandings[0] || null; }

    // ============================================================
    // API — FIXED fetchAllResults (always loads latest)
    // ============================================================
    const BASE = 'https://api.jolpi.ca/ergast/f1/2026';

    async function fetchAllResults() {
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('loading');
      showToast('Fetching latest F1 results...');

      try {
        const res = await fetch(`${BASE}/results.json?limit=50`);
        const data = await res.json();
        const races = data?.MRData?.RaceTable?.Races || [];
        raceResults = {};
        for (const race of races) {
          raceResults[parseInt(race.round)] = race.Results.map(r => ({
            position: r.position,
            familyName: r.Driver.familyName,
            constructorId: r.Constructor.constructorId,
            status: r.status
          }));
        }
      } catch (e) { console.error("Failed to fetch results", e); }

      await fetchStandings();

      try {
        localStorage.setItem('f1pool_data', JSON.stringify({ raceResults, qualyResults, constructorStandings, driverStandings }));
        localStorage.setItem('f1pool_updated', new Date().toISOString());
      } catch (e) { }

      btn.classList.remove('loading');
      updateLastUpdated();
      renderAll();
      showToast('✓ Results updated');
    }

    async function fetchStandings() {
      try {
        const [cs, ds] = await Promise.all([fetch(`${BASE}/constructorStandings.json`).then(r => r.json()), fetch(`${BASE}/driverStandings.json`).then(r => r.json())]);
        constructorStandings = (cs?.MRData?.StandingsTable?.StandingsLists?.[0]?.ConstructorStandings || []).map(c => ({ name: c.Constructor.name, constructorId: c.Constructor.constructorId, points: c.points, position: c.position }));
        driverStandings = (ds?.MRData?.StandingsTable?.StandingsLists?.[0]?.DriverStandings || []).map(d => ({ familyName: d.Driver.familyName, points: d.points, wins: d.wins, position: d.position }));
      } catch (e) { }
    }

    // ============================================================
    // PUSH NOTIFICATIONS + UI HELPERS + RENDERS (unchanged from your original)
    // ============================================================
    // (All the rest of your original script — urlBase64ToUint8Array, toggleNotifications, showScreen, renderLeaderboard, renderRaces, renderCards, renderStats, renderAll, etc. — is kept exactly as in your last full file you sent me)

  </script>
