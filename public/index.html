<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#e10600">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>F1 2026 Pool</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --red:#e10600; --black:#0a0a0a; --card:#141414; --card2:#1c1c1c;
      --border:#2a2a2a; --text:#f0f0f0; --muted:#777;
      --green:#00d471; --gold:#ffd700; --blue:#00aaff;
      --safe-bottom:env(safe-area-inset-bottom,0px);
      --safe-top:env(safe-area-inset-top,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:var(--black);color:var(--text);font-family:'Barlow',sans-serif;overflow:hidden}
    #app{display:flex;flex-direction:column;height:100dvh}

    /* HEADER */
    #header{background:var(--black);border-bottom:2px solid var(--red);padding:calc(var(--safe-top) + 12px) 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
    .header-left{display:flex;align-items:center;gap:10px}
    .f1-badge{background:var(--red);color:white;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:1px;padding:3px 7px;border-radius:3px}
    .header-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;letter-spacing:.5px}
    .header-sub{font-size:11px;color:var(--muted);margin-top:1px}
    .header-actions{display:flex;gap:8px;align-items:center}
    #bell-btn{background:var(--card2);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px;cursor:pointer;display:flex;align-items:center;transition:all .2s;font-size:17px;line-height:1}
    #bell-btn.subscribed{color:var(--gold);border-color:var(--gold);background:rgba(255,215,0,.1)}
    #refresh-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13px;font-family:'Barlow',sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s}
    #refresh-btn:active{background:var(--border)}
    #refresh-btn.loading .spin{animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* MAIN & NAV */
    #main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
    #nav{background:var(--card);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);flex-shrink:0}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;cursor:pointer;font-size:10px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:color .2s;border:none;background:none}
    .nav-item.active{color:var(--red)}
    .nav-item svg{width:22px;height:22px}
    .screen{display:none;padding:16px 16px 24px}
    .screen.active{display:block}

    /* TYPOGRAPHY */
    .section-header{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
    .section-header:first-child{margin-top:0}

    /* LEADERBOARD */
    .entry-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .2s,transform .15s;position:relative;overflow:hidden}
    .entry-card:active{transform:scale(.98)}
    .entry-card.rank-1{border-color:var(--gold)}
    .entry-card.rank-2{border-color:#c0c0c0}
    .entry-card.rank-3{border-color:#cd7f32}
    .rank-ghost{position:absolute;top:0;right:0;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:52px;color:rgba(255,255,255,.04);line-height:1;padding:4px 10px}
    .entry-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .entry-bar{width:4px;height:36px;border-radius:2px;flex-shrink:0}
    .entry-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px}
    .entry-owner{font-size:12px;color:var(--muted)}
    .entry-pts{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px}
    .entry-pts span{font-size:12px;font-weight:400;color:var(--muted)}
    .entry-breakdown{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
    .bd-item{background:var(--card2);border-radius:6px;padding:6px 8px;text-align:center}
    .bd-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
    .bd-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;margin-top:1px}

    .season-progress{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:4px}
    .prog-hdr{display:flex;justify-content:space-between;margin-bottom:10px;font-size:12px}
    .prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
    .prog-fill{height:100%;background:var(--red);border-radius:2px;transition:width .5s}

    /* RACES */
    .race-item{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
    .race-header{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer}
    .race-rnd{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;color:var(--muted);background:var(--card2);border-radius:4px;padding:3px 6px;min-width:28px;text-align:center}
    .race-rnd.done{background:var(--red);color:white}
    .race-info{flex:1}
    .race-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px}
    .race-date{font-size:11px;color:var(--muted);margin-top:1px}
    .race-status{font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:600;padding:3px 8px;border-radius:10px}
    .race-status.done{background:rgba(0,212,113,.15);color:var(--green)}
    .race-status.upcoming{background:var(--card2);color:var(--muted)}
    .race-status.next{background:rgba(225,6,0,.15);color:var(--red)}
    .race-results{padding:0 14px 14px;border-top:1px solid var(--border);display:none}
    .race-results.open{display:block}
    .result-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px}
    .result-row:last-child{border-bottom:none}
    .rpos{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;min-width:24px;text-align:center}
    .rpos.p1{color:var(--gold)}.rpos.p2{color:#c0c0c0}.rpos.p3{color:#cd7f32}
    .rdrv{flex:1}
    .rdrv-name{font-weight:600;font-size:13px}
    .rdrv-team{font-size:10px;color:var(--muted)}
    .badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
    .badge{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;padding:2px 6px;border-radius:4px}
    .badge.full{background:rgba(0,212,113,.2);color:var(--green)}
    .badge.half{background:rgba(0,170,255,.2);color:var(--blue)}

    /* CARDS */
    .cards-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}
    .cards-tabs::-webkit-scrollbar{display:none}
    .tab-btn{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap}
    .tab-btn.active{background:var(--red);border-color:var(--red);color:white}
    .card-view{display:none}.card-view.active{display:block}
    .picks-section{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:14px 0 8px;display:flex;align-items:center;gap:8px}
    .picks-section::after{content:'';flex:1;height:1px;background:var(--border)}
    .pts-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
    .pts-badge.full{background:rgba(0,212,113,.15);color:var(--green)}
    .pts-badge.half{background:rgba(0,170,255,.15);color:var(--blue)}
    .pick-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px}
    .pick-box{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;background:var(--card2);border-radius:4px;padding:2px 7px;color:var(--muted);min-width:26px;text-align:center}
    .pick-drv{flex:1}
    .pick-drv-name{font-weight:600;font-size:14px}
    .pick-drv-team{font-size:11px;color:var(--muted);margin-top:1px}
    .pick-pts{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px}
    .pick-pts.zero{color:var(--muted)}
    .bonus-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:6px}
    .bonus-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
    .bonus-item:last-child{border-bottom:none}
    .bonus-q{color:var(--muted);font-size:12px}
    .bonus-ans{font-weight:600}
    .bonus-pts-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--green)}
    .bonus-pending{color:var(--muted);font-size:12px}
    .card-total-bar{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .card-total-label{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
    .card-total-pts{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:30px}
    .card-rank-badge{background:var(--red);color:white;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;padding:3px 10px;border-radius:20px}

    /* STATS */
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
    .stat-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
    .stat-leader{display:flex;align-items:center;gap:10px}
    .stat-name{font-size:16px;font-weight:600;flex:1}
    .stat-count{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px}
    .stat-sub{font-size:11px;color:var(--muted);margin-top:2px}
    .bonus-indicators{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
    .bi-hit{background:rgba(0,212,113,.15);color:var(--green);font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
    .bi-miss{background:var(--card2);color:var(--muted);font-size:11px;padding:2px 8px;border-radius:10px}

    /* MISC */
    .pending-msg{text-align:center;padding:40px 20px;color:var(--muted)}
    .pending-msg .icon{font-size:40px;margin-bottom:12px}
    .empty{text-align:center;padding:30px;color:var(--muted);font-size:13px}

    /* TOAST */
    #toast{position:fixed;bottom:calc(70px + var(--safe-bottom) + 12px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:200}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-left">
      <div class="f1-badge">F1</div>
      <div>
        <div class="header-title">2026 POOL</div>
        <div class="header-sub" id="last-updated">Loading...</div>
      </div>
    </div>
    <div class="header-actions">
      <button id="bell-btn" onclick="toggleNotifications()" title="Toggle notifications">🔔</button>
      <button id="refresh-btn" onclick="fetchAllResults()">
        <svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M23 4v6h-6M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        Refresh
      </button>
    </div>
  </div>

  <div id="main">
    <div id="screen-leaderboard" class="screen active">
      <div id="leaderboard-content"><div class="empty">🏎️ Loading standings...</div></div>
    </div>
    <div id="screen-races" class="screen">
      <div id="races-content"></div>
    </div>
    <div id="screen-cards" class="screen">
      <div class="cards-tabs" id="cards-tabs"></div>
      <div id="cards-content"></div>
    </div>
    <div id="screen-stats" class="screen">
      <div id="stats-content"><div class="empty">Loading stats...</div></div>
    </div>
  </div>

  <nav id="nav">
    <button class="nav-item active" onclick="showScreen('leaderboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="18" y="3" width="4" height="18"/><rect x="10" y="8" width="4" height="13"/><rect x="2" y="13" width="4" height="8"/></svg>
      Standings
    </button>
    <button class="nav-item" onclick="showScreen('races')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
      Races
    </button>
    <button class="nav-item" onclick="showScreen('cards')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      Cards
    </button>
    <button class="nav-item" onclick="showScreen('stats')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Stats
    </button>
  </nav>
</div>
<div id="toast"></div>

<script>
// ============================================================
// CONFIG & DATA
// ============================================================
const F1_PTS = [25, 18, 15, 12, 10, 8, 6, 4, 2, 1];

const ENTRIES = [
  { id:'f1seer1', name:'F1SEER_1', owner:'Alexis', color:'#00d471',
    full:{A:'Russell',B:'Piastri',C:'Bearman',D:'Lindblad',E:'Alonso'},
    half:{F:'Verstappen',G:'Hamilton',H:'Gasly',I:'Bortoleto',J:'Perez'},
    bonus:{q1:'mercedes',q2:'Leclerc',q3:'Russell'} },
  { id:'f1seer2', name:'F1SEER_2', owner:'Alexis', color:'#e10600',
    full:{A:'Russell',B:'Hamilton',C:'Bearman',D:'Lindblad',E:'Alonso'},
    half:{F:'Verstappen',G:'Antonelli',H:'Gasly',I:'Bortoleto',J:'Perez'},
    bonus:{q1:'mercedes',q2:'Leclerc',q3:'Russell'} },
  { id:'paul', name:'Datrain33', owner:'Paul', color:'#ff9b00',
    full:{A:'Verstappen',B:'Piastri',C:'Sainz',D:'Lawson',E:'Perez'},
    half:{F:'Norris',G:'Antonelli',H:'Gasly',I:'Albon',J:'Alonso'},
    bonus:{q1:'mclaren',q2:'Verstappen',q3:'Verstappen'} },
  { id:'wife', name:'Peaches', owner:'Johana', color:'#ff6bbb',
    full:{A:'Russell',B:'Piastri',C:'Sainz',D:'Albon',E:'Alonso'},
    half:{F:'Verstappen',G:'Antonelli',H:'Gasly',I:'Lawson',J:'Perez'},
    bonus:{q1:'mercedes',q2:'Verstappen',q3:'Russell'} }
];

const TEAM_NAMES = {
  red_bull:'Red Bull', mercedes:'Mercedes', ferrari:'Ferrari',
  mclaren:'McLaren', alpine:'Alpine', williams:'Williams',
  aston_martin:'Aston Martin', haas:'Haas', rb:'Racing Bulls',
  kick_sauber:'Audi/Sauber', sauber:'Audi/Sauber'
};

const DRIVER_TEAM = {
  verstappen:'red_bull', hadjar:'red_bull', russell:'mercedes',
  antonelli:'mercedes', leclerc:'ferrari', hamilton:'ferrari',
  norris:'mclaren', piastri:'mclaren', gasly:'alpine', colapinto:'alpine',
  sainz:'williams', albon:'williams', alonso:'aston_martin',
  stroll:'aston_martin', hulkenberg:'sauber', bortoleto:'sauber',
  bearman:'haas', ocon:'haas', lawson:'rb', lindblad:'rb',
  perez:'cadillac', bottas:'cadillac'
};

const RACES = [
  {round:1,  name:'Australian GP',     circuit:'Melbourne',   date:'2026-03-16', flag:'🇦🇺'},
  {round:2,  name:'Chinese GP',        circuit:'Shanghai',    date:'2026-03-23', flag:'🇨🇳'},
  {round:3,  name:'Japanese GP',       circuit:'Suzuka',      date:'2026-04-06', flag:'🇯🇵'},
  {round:4,  name:'Bahrain GP',        circuit:'Sakhir',      date:'2026-04-13', flag:'🇧🇭'},
  {round:5,  name:'Saudi Arabian GP',  circuit:'Jeddah',      date:'2026-04-20', flag:'🇸🇦'},
  {round:6,  name:'Miami GP',          circuit:'Miami',       date:'2026-05-04', flag:'🇺🇸'},
  {round:7,  name:'Emilia Romagna GP', circuit:'Imola',       date:'2026-05-18', flag:'🇮🇹'},
  {round:8,  name:'Monaco GP',         circuit:'Monaco',      date:'2026-05-25', flag:'🇲🇨'},
  {round:9,  name:'Spanish GP',        circuit:'Barcelona',   date:'2026-06-01', flag:'🇪🇸'},
  {round:10, name:'Canadian GP',       circuit:'Montreal',    date:'2026-06-15', flag:'🇨🇦'},
  {round:11, name:'Austrian GP',       circuit:'Spielberg',   date:'2026-06-29', flag:'🇦🇹'},
  {round:12, name:'British GP',        circuit:'Silverstone', date:'2026-07-06', flag:'🇬🇧'},
  {round:13, name:'Belgian GP',        circuit:'Spa',         date:'2026-07-27', flag:'🇧🇪'},
  {round:14, name:'Hungarian GP',      circuit:'Budapest',    date:'2026-08-03', flag:'🇭🇺'},
  {round:15, name:'Dutch GP',          circuit:'Zandvoort',   date:'2026-08-31', flag:'🇳🇱'},
  {round:16, name:'Italian GP',        circuit:'Monza',       date:'2026-09-07', flag:'🇮🇹'},
  {round:17, name:'Azerbaijan GP',     circuit:'Baku',        date:'2026-09-21', flag:'🇦🇿'},
  {round:18, name:'Singapore GP',      circuit:'Marina Bay',  date:'2026-10-05', flag:'🇸🇬'},
  {round:19, name:'United States GP',  circuit:'Austin',      date:'2026-10-19', flag:'🇺🇸'},
  {round:20, name:'Mexico City GP',    circuit:'Mexico City', date:'2026-10-26', flag:'🇲🇽'},
  {round:21, name:'São Paulo GP',      circuit:'São Paulo',   date:'2026-11-09', flag:'🇧🇷'},
  {round:22, name:'Las Vegas GP',      circuit:'Las Vegas',   date:'2026-11-22', flag:'🇺🇸'},
  {round:23, name:'Qatar GP',          circuit:'Lusail',      date:'2026-11-30', flag:'🇶🇦'},
  {round:24, name:'Abu Dhabi GP',      circuit:'Yas Marina',  date:'2026-12-07', flag:'🇦🇪'}
];

// ============================================================
// STATE
// ============================================================
let raceResults = {}, qualyResults = {}, constructorStandings = [], driverStandings = [];
let activeCard = 'f1seer1';

try {
  const c = localStorage.getItem('f1pool_data');
  if (c) { const d=JSON.parse(c); raceResults=d.raceResults||{}; qualyResults=d.qualyResults||{}; constructorStandings=d.constructorStandings||[]; driverStandings=d.driverStandings||[]; }
} catch(e){}

// ============================================================
// POINTS
// ============================================================
function norm(n){ return (n||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'').trim(); }
function finished(s){ if(!s)return false; const l=s.toLowerCase(); return l==='finished'||l.startsWith('+'); }
function pospts(pos,half){ const p=parseInt(pos); if(p<1||p>10)return 0; return half?F1_PTS[p-1]/2:F1_PTS[p-1]; }

function calcEntry(entry) {
  if(entry.pending||!entry.full) return {total:0,byDriver:{},byRace:{},fullPts:0,halfPts:0};
  let fullPts=0, halfPts=0;
  const byDriver={}, byRace={};
  for(const [rs,results] of Object.entries(raceResults)){
    const round=parseInt(rs); byRace[round]=0;
    if(!results?.length) continue;
    const picks=[
      ...Object.entries(entry.full).map(([box,drv])=>({box,drv,isHalf:false})),
      ...Object.entries(entry.half).map(([box,drv])=>({box,drv,isHalf:true}))
    ];
    for(const {box,drv,isHalf} of picks){
      const r=results.find(x=>norm(x.familyName)===norm(drv));
      if(!r) continue;
      let pts=pospts(r.position,isHalf);
      if(finished(r.status)) pts+=1;
      byDriver[drv]=(byDriver[drv]||0)+pts;
      byRace[round]=(byRace[round]||0)+pts;
      if(isHalf) halfPts+=pts; else fullPts+=pts;
    }
  }
  return {total:fullPts+halfPts,fullPts,halfPts,bonusPts:0,byDriver,byRace};
}

function calcAll(){ return ENTRIES.map(e=>({...e,points:calcEntry(e)})).sort((a,b)=>b.points.total-a.points.total); }
function getPoleLeader(){ const t={}; for(const r of Object.values(qualyResults)){ const p=r?.find(x=>parseInt(x.position)===1); if(p) t[p.familyName]=(t[p.familyName]||0)+1; } return Object.entries(t).sort((a,b)=>b[1]-a[1])[0]||null; }
function getWinsLeader(){ const t={}; for(const r of Object.values(raceResults)){ const p=r?.find(x=>parseInt(x.position)===1); if(p) t[p.familyName]=(t[p.familyName]||0)+1; } return Object.entries(t).sort((a,b)=>b[1]-a[1])[0]||null; }
function getCtorLeader(){ return constructorStandings[0]||null; }

// ============================================================
// API
// ============================================================
const BASE='https://api.jolpi.ca/ergast/f1/2026';

async function fetchRace(round){
  try{ const d=await(await fetch(`${BASE}/${round}/results.json`)).json(); const r=d?.MRData?.RaceTable?.Races; if(!r?.length)return null; return r[0].Results.map(x=>({position:x.position,familyName:x.Driver.familyName,constructorId:x.Constructor.constructorId,status:x.status})); }catch(e){return null;}
}
async function fetchQualy(round){
  try{ const d=await(await fetch(`${BASE}/${round}/qualifying.json`)).json(); const r=d?.MRData?.RaceTable?.Races; if(!r?.length)return null; return r[0].QualifyingResults.map(x=>({position:x.position,familyName:x.Driver.familyName})); }catch(e){return null;}
}
async function fetchStandings(){
  try{
    const [cs,ds]=await Promise.all([fetch(`${BASE}/constructorStandings.json`).then(r=>r.json()),fetch(`${BASE}/driverStandings.json`).then(r=>r.json())]);
    constructorStandings=(cs?.MRData?.StandingsTable?.StandingsLists?.[0]?.ConstructorStandings||[]).map(c=>({name:c.Constructor.name,constructorId:c.Constructor.constructorId,points:c.points,position:c.position}));
    driverStandings=(ds?.MRData?.StandingsTable?.StandingsLists?.[0]?.DriverStandings||[]).map(d=>({familyName:d.Driver.familyName,points:d.points,wins:d.wins,position:d.position}));
  }catch(e){}
}

async function fetchAllResults(){
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('loading');
  showToast('Fetching latest F1 results...');
  const today=new Date();
  const past=RACES.filter(r=>new Date(r.date)<today);
  await Promise.all([
    ...past.map(async race=>{
      if(!raceResults[race.round]){ const r=await fetchRace(race.round); if(r) raceResults[race.round]=r; }
      if(!qualyResults[race.round]){ const q=await fetchQualy(race.round); if(q) qualyResults[race.round]=q; }
    }),
    fetchStandings()
  ]);
  try{ localStorage.setItem('f1pool_data',JSON.stringify({raceResults,qualyResults,constructorStandings,driverStandings})); localStorage.setItem('f1pool_updated',new Date().toISOString()); }catch(e){}
  btn.classList.remove('loading');
  updateLastUpdated();
  renderAll();
  showToast('✓ Results updated');
}

// ============================================================
// PUSH NOTIFICATIONS
// ============================================================
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = window.atob(base64);
  return Uint8Array.from([...rawData].map(char => char.charCodeAt(0)));
}

async function getSubscriptionStatus() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return 'unsupported';
  const reg = await navigator.serviceWorker.ready;
  const sub = await reg.pushManager.getSubscription();
  return sub ? 'subscribed' : 'unsubscribed';
}

async function updateBellButton() {
  const btn = document.getElementById('bell-btn');
  const status = await getSubscriptionStatus();
  if (status === 'subscribed') {
    btn.classList.add('subscribed');
    btn.title = 'Notifications ON — tap to turn off';
    btn.textContent = '🔔';
  } else if (status === 'unsupported') {
    btn.style.display = 'none';
  } else {
    btn.classList.remove('subscribed');
    btn.title = 'Tap to get race result notifications';
    btn.textContent = '🔕';
  }
}

async function toggleNotifications() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    showToast('Push notifications not supported on this browser');
    return;
  }
  const reg = await navigator.serviceWorker.ready;
  const existing = await reg.pushManager.getSubscription();

  if (existing) {
    // Unsubscribe
    await existing.unsubscribe();
    try { await fetch('/api/subscribe', { method:'DELETE', headers:{'Content-Type':'application/json'}, body: JSON.stringify(existing) }); } catch(e){}
    showToast('🔕 Notifications turned off');
  } else {
    // Subscribe — fetch VAPID key from server
    try {
      const keyRes = await fetch('/api/vapid-public-key');
      if (!keyRes.ok) throw new Error('VAPID key not available');
      const { publicKey } = await keyRes.json();

      const permission = await Notification.requestPermission();
      if (permission !== 'granted') { showToast('Notification permission denied'); return; }

      const subscription = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(publicKey)
      });
      await fetch('/api/subscribe', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(subscription) });
      showToast('🔔 You\'ll be notified after each race!');
    } catch(e) {
      console.error(e);
      showToast('Could not subscribe: ' + e.message);
    }
  }
  updateBellButton();
}

// ============================================================
// UI HELPERS
// ============================================================
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  const idx=['leaderboard','races','cards','stats'].indexOf(name);
  document.querySelectorAll('.nav-item')[idx]?.classList.add('active');
}

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }

function updateLastUpdated(){ const el=document.getElementById('last-updated'); const ts=localStorage.getItem('f1pool_updated'); el.textContent=ts?`Updated ${new Date(ts).toLocaleDateString('en-CA',{month:'short',day:'numeric'})} ${new Date(ts).toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'})}`:'2026 Season'; }

function formatDate(s){ return new Date(s).toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'}); }

function raceStatus(race){ const today=new Date(); const d=new Date(race.date); const diff=(d-today)/(1000*60*60*24); if(raceResults[race.round])return'done'; if(diff<=7&&diff>-1)return'next'; return'upcoming'; }

// ============================================================
// RENDERS
// ============================================================
function renderLeaderboard(){
  const sorted=calcAll(); const done=Object.keys(raceResults).length;
  const medals=['🥇','🥈','🥉'];
  let html='<div class="section-header">Season Standings</div>';
  sorted.forEach((e,i)=>{
    const rank=i+1; const pts=e.points;
    html+=`<div class="entry-card rank-${rank<=3?rank:''}" onclick="showCardDetail('${e.id}')">
      <div class="rank-ghost">${rank}</div>
      <div class="entry-top">
        <div class="entry-bar" style="background:${e.color}"></div>
        <div><div class="entry-name">${e.name} ${medals[i]||''}</div><div class="entry-owner">${e.owner}</div></div>
        <div class="entry-pts">${pts.total.toFixed(1)}<span> pts</span></div>
      </div>
      <div class="entry-breakdown">
        <div class="bd-item"><div class="bd-label">Full Pts</div><div class="bd-val">${pts.fullPts.toFixed(1)}</div></div>
        <div class="bd-item"><div class="bd-label">Half Pts</div><div class="bd-val">${pts.halfPts.toFixed(1)}</div></div>
        <div class="bd-item"><div class="bd-label">Bonus</div><div class="bd-val">${pts.bonusPts>0?pts.bonusPts:'—'}</div></div>
      </div></div>`;
  });
  html+=`<div class="section-header">Season Progress</div>
    <div class="season-progress">
      <div class="prog-hdr"><span>${done} of 24 races completed</span><span style="color:var(--muted)">${24-done} remaining</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${(done/24*100).toFixed(1)}%"></div></div>
    </div>`;
  document.getElementById('leaderboard-content').innerHTML=html;
}

function renderRaces(){
  const sorted=calcAll(); let html=''; let shownUp=false, shownDone=false;
  RACES.forEach(race=>{
    const status=raceStatus(race); const res=raceResults[race.round];
    if(status==='done'&&!shownDone){html+='<div class="section-header">Completed Races</div>';shownDone=true;}
    if((status==='next'||status==='upcoming')&&!shownUp){html+='<div class="section-header">Upcoming Races</div>';shownUp=true;}
    const badge=status==='done'?`<span class="race-status done">Done ✓</span>`:status==='next'?`<span class="race-status next">Next 🔥</span>`:`<span class="race-status upcoming">${formatDate(race.date)}</span>`;
    let resHtml='';
    if(res){
      const top10=res.slice(0,10);
      resHtml=`<div class="race-results" id="rr-${race.round}"><div style="margin-top:10px">${top10.map(r=>{
        const p=parseInt(r.position); const pc=p===1?'p1':p===2?'p2':p===3?'p3':'';
        const team=TEAM_NAMES[r.constructorId]||r.constructorId;
        const bgs=[];
        sorted.forEach(e=>{
          if(e.pending)return;
          const allPicks={...e.full,...e.half};
          for(const[box,drv]of Object.entries(allPicks)){
            if(norm(drv)===norm(r.familyName)){
              const isHalf=e.half[box]!==undefined&&e.full[box]===undefined;
              const pts=pospts(p,isHalf)+(finished(r.status)?1:0);
              bgs.push(`<span class="badge ${isHalf?'half':'full'}">${e.name}${box}:+${pts}</span>`);
            }
          }
        });
        return `<div class="result-row"><div class="rpos ${pc}">${p}</div><div class="rdrv"><div class="rdrv-name">${r.familyName}</div><div class="rdrv-team">${team}</div></div><div class="badges">${bgs.join('')}</div></div>`;
      }).join('')}</div></div>`;
    }
    html+=`<div class="race-item"><div class="race-header" onclick="toggleRes(${race.round})"><div class="race-rnd ${status==='done'?'done':''}">${race.round}</div><div class="race-info"><div class="race-name">${race.flag} ${race.name}</div><div class="race-date">${race.circuit}</div></div>${badge}</div>${resHtml}</div>`;
  });
  document.getElementById('races-content').innerHTML=html;
}

function toggleRes(round){ document.getElementById(`rr-${round}`)?.classList.toggle('open'); }

function renderCards(){
  document.getElementById('cards-tabs').innerHTML=ENTRIES.map(e=>`<button class="tab-btn ${e.id===activeCard?'active':''}" onclick="switchCard('${e.id}')">${e.name}</button>`).join('');
  document.getElementById('cards-content').innerHTML=ENTRIES.map(e=>renderCardView(e)).join('');
}

function switchCard(id){
  activeCard=id;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',ENTRIES[i].id===id));
  document.querySelectorAll('.card-view').forEach(v=>v.classList.toggle('active',v.dataset.id===id));
}

function showCardDetail(id){ showScreen('cards'); switchCard(id); }

function renderCardView(entry){
  if(entry.pending) return `<div class="card-view ${entry.id===activeCard?'active':''}" data-id="${entry.id}"><div class="pending-msg"><div class="icon">📋</div><div style="font-size:16px;font-weight:600;margin-bottom:8px">Picks pending</div>Waiting for ${entry.owner}'s selections.</div></div>`;
  const sorted=calcAll(); const e2=sorted.find(x=>x.id===entry.id); const pts=e2?.points||{total:0,byDriver:{},fullPts:0,halfPts:0}; const rank=sorted.findIndex(x=>x.id===entry.id)+1;
  const pole=getPoleLeader(); const wins=getWinsLeader(); const ctor=getCtorLeader();
  const ctorMap={mercedes:'Mercedes',ferrari:'Ferrari',red_bull:'Red Bull',mclaren:'McLaren',alpine:'Alpine',aston_martin:'Aston Martin'};

  function bonusSt(type){
    if(type==='q1'){ if(!ctor)return`<span class="bonus-pending">Pending</span>`; const m=norm(ctor.constructorId).includes(norm(entry.bonus.q1))||norm(entry.bonus.q1).includes(norm(ctor.constructorId)); return m?`<span class="bonus-pts-val">+5 (leading)</span>`:`<span class="bonus-pending">Leading: ${ctor.name}</span>`; }
    if(type==='q2'){ if(!pole)return`<span class="bonus-pending">Pending</span>`; return norm(pole[0])===norm(entry.bonus.q2)?`<span class="bonus-pts-val">+5 (${pole[1]} poles)</span>`:`<span class="bonus-pending">Leader: ${pole[0]} (${pole[1]})</span>`; }
    if(type==='q3'){ if(!wins)return`<span class="bonus-pending">Pending</span>`; return norm(wins[0])===norm(entry.bonus.q3)?`<span class="bonus-pts-val">+5 (${wins[1]} wins)</span>`:`<span class="bonus-pending">Leader: ${wins[0]} (${wins[1]})</span>`; }
  }

  function row(box,drv,isHalf){
    const team=TEAM_NAMES[DRIVER_TEAM[norm(drv)]]||'';
    const dp=(pts.byDriver[drv]||0);
    return `<div class="pick-row"><div class="pick-box">${box}</div><div class="pick-drv"><div class="pick-drv-name">${drv}</div><div class="pick-drv-team">${team}</div></div><div class="pick-pts ${dp===0?'zero':''}">${dp>0?dp.toFixed(1):'—'}</div></div>`;
  }

  return `<div class="card-view ${entry.id===activeCard?'active':''}" data-id="${entry.id}">
    <div class="card-total-bar"><div><div class="card-total-label">Season Total</div><div class="card-total-pts" style="color:${entry.color}">${pts.total.toFixed(1)}</div></div><div class="card-rank-badge">P${rank}</div></div>
    <div class="picks-section">Full Points A–E <span class="pts-badge full">25/18/15…</span></div>
    ${Object.entries(entry.full).map(([b,d])=>row(b,d,false)).join('')}
    <div class="picks-section">Half Points F–J <span class="pts-badge half">12.5/9/7.5…</span></div>
    ${Object.entries(entry.half).map(([b,d])=>row(b,d,true)).join('')}
    <div class="picks-section">Bonus <span class="pts-badge" style="background:rgba(255,215,0,.15);color:var(--gold)">5 pts each</span></div>
    <div class="bonus-card">
      <div class="bonus-item"><div><div class="bonus-ans">${ctorMap[entry.bonus.q1]||entry.bonus.q1}</div><div class="bonus-q">Constructors Champion</div></div>${bonusSt('q1')}</div>
      <div class="bonus-item"><div><div class="bonus-ans">${entry.bonus.q2}</div><div class="bonus-q">Most Pole Positions</div></div>${bonusSt('q2')}</div>
      <div class="bonus-item"><div><div class="bonus-ans">${entry.bonus.q3}</div><div class="bonus-q">Most Race Wins</div></div>${bonusSt('q3')}</div>
    </div></div>`;
}

function renderStats(){
  const pole=getPoleLeader(); const wins=getWinsLeader(); const ctor=getCtorLeader(); const done=Object.keys(raceResults).length;
  function inds(type,leader){
    if(!leader)return'<span class="bi-miss">No data yet</span>';
    return ENTRIES.filter(e=>!e.pending).map(e=>{
      const pick=type==='q1'?e.bonus.q1:type==='q2'?e.bonus.q2:e.bonus.q3;
      const ln=type==='q1'?leader.constructorId:leader[0];
      const m=norm(ln).includes(norm(pick))||norm(pick).includes(norm(ln));
      return m?`<span class="bi-hit">${e.name} ✓</span>`:`<span class="bi-miss">${e.name}: ${pick}</span>`;
    }).join('');
  }
  let html=`
  <div class="section-header">Bonus Question Tracker</div>
  <div class="stat-card"><div class="stat-title">🏗️ Constructors Championship Leader</div>${ctor?`<div class="stat-leader"><div><div class="stat-name">${ctor.name}</div><div class="stat-sub">${ctor.points} pts</div></div><div class="stat-count">${ctor.points}</div></div><div class="bonus-indicators">${inds('q1',ctor)}</div>`:'<div class="empty">Season not started</div>'}</div>
  <div class="stat-card"><div class="stat-title">⚡ Most Pole Positions</div>${pole?`<div class="stat-leader"><div><div class="stat-name">${pole[0]}</div><div class="stat-sub">${pole[1]} poles from ${done} races</div></div><div class="stat-count">${pole[1]}</div></div><div class="bonus-indicators">${inds('q2',pole)}</div>`:'<div class="empty">Season not started</div>'}</div>
  <div class="stat-card"><div class="stat-title">🏆 Most Race Wins</div>${wins?`<div class="stat-leader"><div><div class="stat-name">${wins[0]}</div><div class="stat-sub">${wins[1]} wins from ${done} races</div></div><div class="stat-count">${wins[1]}</div></div><div class="bonus-indicators">${inds('q3',wins)}</div>`:'<div class="empty">Season not started</div>'}</div>
  <div class="section-header">Scoring Reference</div>
  <div class="stat-card"><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px">
    <div><div style="color:var(--green);font-weight:600;margin-bottom:6px">Boxes A–E (Full)</div>${F1_PTS.map((p,i)=>`<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">P${i+1}</span><span>${p}</span></div>`).join('')}</div>
    <div><div style="color:var(--blue);font-weight:600;margin-bottom:6px">Boxes F–J (Half)</div>${F1_PTS.map((p,i)=>`<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">P${i+1}</span><span>${p/2}</span></div>`).join('')}</div>
  </div><div style="margin-top:10px;padding:8px;background:var(--card2);border-radius:6px;font-size:12px;color:var(--muted)">⭐ +1 pt for finishing race &nbsp;·&nbsp; Bonus questions: 5 pts each &nbsp;·&nbsp; Bonuses awarded at season end</div></div>`;
  document.getElementById('stats-content').innerHTML=html;
}

function renderAll(){ renderLeaderboard(); renderRaces(); renderCards(); renderStats(); }

updateLastUpdated();
