<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>F1 2026 Pool - Diagnostic</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #000;
      color: #fff;
      line-height: 1.6;
    }

    #status {
      font-size: 18px;
      margin: 20px 0;
      padding: 15px;
      background: #1c1c1c;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <h1>F1 2026 Pool - Diagnostic</h1>
  <div id="status">Loading from API...</div>

  <script>
    const BASE = 'https://api.jolpi.ca/ergast/f1/2026';

    async function loadData() {
      const status = document.getElementById('status');
      status.textContent = 'Fetching full 2026 schedule...';

      try {
        const res = await fetch(`${BASE}/`);
        const data = await res.json();
        const races = data.MRData.RaceTable.Races;
        status.innerHTML = `<strong>✅ SUCCESS!</strong><br>Loaded ${races.length} races from API.<br><br>First race: ${races[0].raceName} on ${races[0].date}<br><br>Now replace with the full app.`;
        console.log('Full API data:', races);
      } catch (e) {
        status.innerHTML = `❌ ERROR: ${e.message}`;
        console.error(e);
      }
    }

    loadData();
  </script>
</body>

</html>
